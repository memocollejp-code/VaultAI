name: Deploy VaultAI

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update cache version
        run: |
          VERSION="v$(date +'%Y%m%d%H%M%S')"
          echo "New cache version: $VERSION"
          sed -i "s/const CACHE_VERSION = '[^']*'/const CACHE_VERSION = '$VERSION'/" sw.js

      - name: Commit updated sw.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet || git commit -m "🔄 Auto update cache version"
          git push
